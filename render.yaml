services:
  - type: web
    name: asbl-handover
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # No disk on the free plan: db.sqlite3 + media/ live in the container's
    # own (ephemeral) filesystem via settings.py's defaults, and reset on
    # every restart / redeploy / 15-min-idle spin-down. Demo-only tradeoff —
    # add a paid plan + disk block back for real, durable inspection data.
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
